{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <h2>🔑 Welcome Back</h2>
    <p class="sub">Login to your Account</p>
    <div id="alert-container"></div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@gmail.com" required
          value="{{ request.form.get('email','') }}">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('forgot_password') }}">Forgot Password?</a><br>
      <span>Don't have an account?</span> <a href="{{ url_for('signup') }}">Sign Up</a>
    </div>
  </div>
</div>
{% endblock %}
